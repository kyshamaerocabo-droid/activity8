<div class="container">

<h2>Register</h2>

<label>Username</label>
<input type="text" [(ngModel)]="username">

<label>Email</label>
<input type="text" [(ngModel)]="email">

<label>Password</label>
<input type="password" [(ngModel)]="password">

<label>Contact</label>
<input type="text" [(ngModel)]="contact">

<label>Address</label>
<input type="text" [(ngModel)]="address">

<label>Role</label>
<select [(ngModel)]="role">
  <option>Student</option>
  <option>Admin</option>
</select>

<br><br>

<button (click)="register()">Register</button>

<br><br>

<p>Already have an account? <a href="#">Login</a></p>

<table border="1">

<tr>
<th>Username</th>
<th>Email</th>
<th>Contact</th>
<th>Address</th>
</tr>

<tr *ngFor="let u of users">
<td>{{u.username}}</td>
<td>{{u.email}}</td>
<td>{{u.contact}}</td>
<td>{{u.address}}</td>
</tr>

</table>

<br>

<p style="color:rgb(255, 0, 0)">{{message}}</p>

</div>
